<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator — Field Notes</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-head">
  <div class="head-row">
    <div>
      <div class="mark">FN</div>
      <h1>Calculator</h1>
      <p class="sub">Arithmetic, kept plain</p>
    </div>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
      <span class="theme-dot"></span>
      <span id="themeLabel">Dark</span>
    </button>
  </div>
</header>

<main class="calc-wrap">
  <div class="calc" id="calc">

    <div class="screen">
      <div class="screen-history" id="history">&nbsp;</div>
      <div class="screen-main" id="display">0</div>
    </div>

    <div class="pad">
      <button class="key key-unary" data-action="sign">+/&minus;</button>
      <button class="key key-unary" data-action="square">x&sup2;</button>
      <button class="key key-unary" data-action="sqrt">&#8730;x</button>
      <button class="key key-unary" data-action="reciprocal">1/x</button>

      <button class="key key-fn" data-action="clear">AC</button>
      <button class="key key-fn" data-action="backspace">&#9003;</button>
      <button class="key key-fn" data-action="percent">%</button>
      <button class="key key-op" data-op="÷">&#247;</button>

      <button class="key" data-num="7">7</button>
      <button class="key" data-num="8">8</button>
      <button class="key" data-num="9">9</button>
      <button class="key key-op" data-op="×">&#215;</button>

      <button class="key" data-num="4">4</button>
      <button class="key" data-num="5">5</button>
      <button class="key" data-num="6">6</button>
      <button class="key key-op" data-op="−">&#8722;</button>

      <button class="key" data-num="1">1</button>
      <button class="key" data-num="2">2</button>
      <button class="key" data-num="3">3</button>
      <button class="key key-op" data-op="+">+</button>

      <button class="key key-zero" data-num="0">0</button>
      <button class="key" data-action="decimal">.</button>
      <button class="key key-equals" data-action="equals">=</button>
    </div>

  </div>

  <p class="hint">Keyboard supported — numbers, + − * /, Enter, Backspace, Esc. Includes sign flip, square, root and reciprocal.</p>
</main>

<script src="script.js"></script>
</body>
</html>
